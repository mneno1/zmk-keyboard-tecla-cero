name: Release ZMK firmware

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware

      - name: Bundle firmware into zip
        run: |
          mkdir -p output
          find firmware -name "*.uf2" -exec cp {} output/ \;
          cd output && zip ../firmware.zip *.uf2

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware.zip
          generate_release_notes: true
